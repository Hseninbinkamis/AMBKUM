        // --- COMPONENTS ---
        function App() {
            const [currentUser, setCurrentUser] = useState(null); 
            const [submissions, setSubmissions] = useState([]); 
            const [materials, setMaterials] = useState(defaultMaterials); 
            const [chats, setChats] = useState([]); 
            const [announcement, setAnnouncement] = useState('"Integritas dan Kedisiplinan adalah kunci kesuksesan seorang Taruna. Jangan ragu untuk menghubungi layanan Bimbingan dan Konseling jika Anda mengalami kendala selama menempuh pendidikan."'); 
            const [studentView, setStudentView] = useState('home'); 
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [authUser, setAuthUser] = useState(null);
            const [firebaseStatus, setFirebaseStatus] = useState('connecting');

            useEffect(() => {
                if (!auth) {
                    setFirebaseStatus('error');
                    return;
                }
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !isUsingCustomConfig) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        if (isMounted) setFirebaseStatus('connected');
                    } catch (error) {
                        console.error("Auth error:", error);
                        if (error.code === 'auth/configuration-not-found' || error.code === 'auth/invalid-custom-token') {
                             try {
                                  await signInAnonymously(auth);
                                  if (isMounted) setFirebaseStatus('connected');
                             } catch (fallbackError) {
                                  console.error("Fallback Auth error:", fallbackError);
                                  if (isMounted) setFirebaseStatus('error');
                             }
                        } else {
                             if (isMounted) setFirebaseStatus('error');
                        }
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    if (isMounted) {
                        setAuthUser(user);
                        if (user) setFirebaseStatus('connected');
                    }
                });
                return () => {
                    isMounted = false;
                    unsubscribe();
                };
            }, []);

            useEffect(() => {
                if (!authUser || !db) {
                    const localData = JSON.parse(localStorage.getItem('bk_data_v4') || '[]');
                    const localMat = JSON.parse(localStorage.getItem('bk_materi_v1') || '[]');
                    const localChats = JSON.parse(localStorage.getItem('bk_chats_v1') || '[]');
                    setSubmissions(localData);
                    setChats(localChats);
                    if(localMat.length > 0) setMaterials(localMat);
                    return;
                }

                const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
                const unsubscribeSub = onSnapshot(submissionsRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ ...doc.data(), id: doc.id }));
                    data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    localStorage.setItem('bk_data_v4', JSON.stringify(data));
                    setSubmissions(data);
                }, (error) => {
                    console.error("Gagal memuat laporan:", error);
                    setFirebaseStatus('error');
                });

                const materialsRef = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                const unsubscribeMat = onSnapshot(materialsRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ ...doc.data(), id: doc.id }));
                    if (data.length > 0) {
                        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        localStorage.setItem('bk_materi_v1', JSON.stringify(data));
                        setMaterials(data);
                    } else {
                        setMaterials(defaultMaterials);
                    }
                }, (error) => console.error(error));

                const announcementRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'announcement');
                const unsubscribeAnn = onSnapshot(announcementRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().text) setAnnouncement(docSnap.data().text);
                });

                const chatsRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                const unsubscribeChats = onSnapshot(chatsRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ ...doc.data(), id: doc.id }));
                    data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    localStorage.setItem('bk_chats_v1', JSON.stringify(data));
                    setChats(data);
                }, (error) => console.error("Gagal load chat:", error));

                return () => {
                    unsubscribeSub();
                    unsubscribeMat();
                    unsubscribeAnn();
                    unsubscribeChats();
                };
            }, [authUser]);

            const handleLogin = (user) => {
                setCurrentUser(user);
                setStudentView('home');
            };

                setCurrentUser(null);
                setIsMobileMenuOpen(false);
            };

            const handleAddMaterial = async (newMaterial) => {
                if (!db || !authUser) return alert("GAGAL: Harus terhubung ke Database Cloud.");
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), { ...newMaterial, timestamp: new Date().toISOString() });
                    alert("Materi berhasil ditambahkan!");
                } catch (error) { console.error(error); alert("Terjadi kesalahan."); }
            };

            const handleDeleteMaterial = async (materialId) => {
                if (!db || !authUser) return;
                if (window.confirm("Apakah Anda yakin ingin menghapus materi ini?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', materialId));
                    } catch (error) { console.error(error); }
                }
            };

            const handleEditMaterial = async (materialId, updatedData) => {
                if (!db || !authUser) return alert("GAGAL: Harus terhubung ke Database Cloud untuk mengedit materi.");
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', materialId), { ...updatedData, timestamp: new Date().toISOString() });
                    alert("Materi berhasil diperbarui!");
                } catch (error) { console.error("Gagal edit materi:", error); alert("Gagal mengedit. Pastikan hak akses Firebase terbuka.");}
            };

            const handleUpdateAnnouncement = async (text) => {
                if (!db || !authUser) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'announcement'), { text });
                    alert("Pengumuman berhasil diperbarui!");
                } catch (error) { console.error(error); }
            };

            const handleDeleteSubmission = async (submissionId) => {
                if (!db || !authUser) return;
                if (window.confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', submissionId));
                    } catch (error) {
                        const currentLocalData = JSON.parse(localStorage.getItem('bk_data_v4') || '[]');
                        const updated = currentLocalData.filter(sub => sub.id !== submissionId);
                        localStorage.setItem('bk_data_v4', JSON.stringify(updated));
                        setSubmissions(updated);
                    }
                }
            };

            const handleSendChat = async (chatData) => {
                if (!db || !authUser) {
                    alert("Mode Offline: Pesan hanya tersimpan di perangkat ini.");
                    const newChat = { ...chatData, timestamp: new Date().toISOString(), id: Date.now().toString() };
                    const updatedChats = [...chats, newChat];
                    setChats(updatedChats);
                    localStorage.setItem('bk_chats_v1', JSON.stringify(updatedChats));
                    return;
                }
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), { 
                        ...chatData, timestamp: new Date().toISOString() 
                    });
                } catch (error) { console.error("Gagal kirim pesan:", error); alert("Gagal mengirim pesan."); }
            };

            const handleSubmit = async (newData) => {
                const newSubmission = {
                    name: currentUser.name, 
                    classCode: currentUser.classCode, 
                    nis: currentUser.nis, 
                    timestamp: new Date().toISOString(), 
                    ...newData
                };

                let savedToCloud = false;

                if (firebaseStatus === 'connected' && db && authUser) {
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), newSubmission);
                        savedToCloud = true;
                    } catch (error) {
                        console.error("Gagal simpan ke Cloud:", error);
                    }
                }

                if (!savedToCloud) {
                    const currentLocalData = JSON.parse(localStorage.getItem('bk_data_v4') || '[]');
                    const fallbackSub = { ...newSubmission, id: Date.now().toString() };
                    const updatedLocalData = [fallbackSub, ...currentLocalData].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    localStorage.setItem('bk_data_v4', JSON.stringify(updatedLocalData));
                    setSubmissions(updatedLocalData); 
                }
            };

            const navigateTo = (view) => {
                setStudentView(view);
                setIsMobileMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
                    <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b-4 border-amber-400">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center relative">
                            
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => currentUser?.role === 'student' && navigateTo('home')}>
                                <div className="bg-white/10 p-2 rounded border border-amber-400/30">
                                    <Icons.Anchor className="h-6 w-6 text-amber-400" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-widest uppercase text-amber-400 leading-tight flex items-center">
                                        AM BK UM 2026 
                                    </h1>
                                    <p className="text-xs text-slate-300 tracking-wide hidden sm:block">SMAN Taruna Nala Jawa Timur</p>
                                </div>
                            </div>

                            <div className="flex items-center space-x-4">
                                {firebaseStatus === 'error' && (
                                    <span title="Database belum tersetting dengan benar (Cek Auth & Rules)" className="hidden md:flex items-center bg-red-600/20 text-red-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider border border-red-500/50 cursor-help">
                                        <Icons.CloudOff className="w-4 h-4 mr-1"/> Offline
                                    </span>
                                )}
                                {firebaseStatus === 'connected' && (
                                    <span title="Terhubung ke Database Cloud AMBK" className="hidden md:flex items-center bg-emerald-600/20 text-emerald-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider border border-emerald-500/50">
                                        <Icons.CloudCheck className="w-4 h-4 mr-1"/> Online
                                    </span>
                                )}

                                {currentUser && currentUser.role === 'student' ? (
                                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded transition border border-slate-700 text-amber-400 flex items-center">
                                        <span className="text-xs font-bold uppercase tracking-wider mr-2 hidden sm:block">Menu Utama</span>
                                        {isMobileMenuOpen ? <Icons.X className="h-6 w-6" /> : <Icons.Menu className="h-6 w-6" />}
                                    </button>
                                ) : currentUser && currentUser.role === 'teacher' ? (
                                    <button onClick={handleLogout} className="flex items-center space-x-2 bg-red-800/80 hover:bg-red-700 px-4 py-1.5 rounded text-sm transition border border-red-600 font-medium tracking-wide uppercase text-xs">
                                        <Icons.LogOut className="h-4 w-4" />
                                        <span className="hidden sm:inline">Keluar</span>
                                    </button>
                                ) : null}
                            </div>
                        </div>

                        {currentUser && currentUser.role === 'student' && isMobileMenuOpen && (
                            <div className="absolute top-full left-0 w-full bg-slate-900 border-b border-slate-800 shadow-2xl animate-fade-in z-40">
                                <nav className="max-w-6xl mx-auto px-4 py-4 flex flex-col space-y-2">
                                    <button onClick={() => navigateTo('home')} className={`text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest transition ${studentView === 'home' ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                        <Icons.Layout className="inline w-5 h-5 mr-3 mb-1" /> Beranda Utama
                                    </button>
                                    <button onClick={() => navigateTo('assessment')} className={`text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest transition ${studentView === 'assessment' ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                        <Icons.Activity className="inline w-5 h-5 mr-3 mb-1" /> Need Assessment
                                    </button>
                                    <button onClick={() => navigateTo('dcm')} className={`text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest transition ${studentView === 'dcm' ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                        <Icons.CheckSquare className="inline w-5 h-5 mr-3 mb-1" /> Daftar Cek Masalah
                                    </button>
                                    <button onClick={() => navigateTo('curhat')} className={`text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest transition ${studentView === 'curhat' ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                        <Icons.HeartHandshake className="inline w-5 h-5 mr-3 mb-1" /> Ruang Konseling
                                    </button>
                                    <button onClick={() => navigateTo('materi')} className={`text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest transition ${studentView === 'materi' ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                        <Icons.BookOpen className="inline w-5 h-5 mr-3 mb-1" /> Materi BK
                                    </button>
                                    <div className="border-t border-slate-700 my-2"></div>
                                    <button onClick={handleLogout} className="text-left px-4 py-3 rounded uppercase text-sm font-bold tracking-widest text-red-400 hover:bg-red-900/50 transition">
                                        <Icons.LogOut className="inline w-5 h-5 mr-3 mb-1" /> Keluar
                                    </button>
                                </nav>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 max-w-6xl w-full mx-auto px-4 py-8 relative flex flex-col">
                        {!currentUser ? (
                            <LoginPage onLogin={handleLogin} />
                        ) : currentUser.role === 'student' ? (
                            <StudentPortal 
                                user={currentUser} 
                                onSubmit={handleSubmit} 
                                view={studentView} 
                                setView={navigateTo} 
                                materials={materials}
                                announcement={announcement}
                                submissions={submissions}
                                chats={chats}
                                onSendChat={handleSendChat}
                            />
                        ) : (
                            <TeacherDashboard 
                                submissions={submissions} 
                                materials={materials}
                                announcement={announcement}
                                chats={chats}
                                onAddMaterial={handleAddMaterial}
                                onDeleteMaterial={handleDeleteMaterial}
                                onEditMaterial={handleEditMaterial}
                                onUpdateAnnouncement={handleUpdateAnnouncement}
                                onDeleteSubmission={handleDeleteSubmission}
                                onSendChat={handleSendChat}
                            />
                        )}
                    </main>
                </div>
            );
        }

        // --- HALAMAN LOGIN ---
        function LoginPage({ onLogin }) {
            const [activeTab, setActiveTab] = useState('student'); 
            const [studentName, setStudentName] = useState('');
            const [studentNis, setStudentNis] = useState(''); 
            const [studentClass, setStudentClass] = useState('');
            const [teacherPass, setTeacherPass] = useState('');
            const [error, setError] = useState('');

            const handleStudentLogin = (e) => {
                e.preventDefault();
                if (!studentName || !studentClass || !studentNis) {
                    setError('Mohon lengkapi Identitas Anda (Nama, Kode Rahasia dan Kelas)!');
                    return;
                }
                onLogin({ role: 'student', name: studentName, classCode: studentClass, nis: studentNis });
            };

            const handleTeacherLogin = (e) => {
                e.preventDefault();
                if (teacherPass === '123321') onLogin({ role: 'teacher', name: 'Guru BK' });
                else setError('Kode otorisasi salah.');
            };

            return (
                <div className="max-w-4xl mx-auto w-full animate-fade-in relative shadow-2xl rounded-lg overflow-hidden flex flex-col md:flex-row min-h-[500px]">
                    <div className="md:w-1/2 relative bg-slate-900 flex flex-col justify-center items-center text-white p-10 text-center overflow-hidden">
                        <div className="absolute inset-0 z-0 bg-cover bg-center" style={{ backgroundImage: "url('https://sekolah.link/wp-content/uploads/2022/06/smp-neger-30-malang-1536x877.png')", transform: "scale(1.2)", backgroundPosition: "center bottom" }}></div>
                        <div className="absolute inset-0 bg-slate-900/60 z-10 mix-blend-multiply"></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent z-10"></div>
                        
                        <div className="relative z-20">
                            <div className="bg-slate-900/40 p-4 rounded-full inline-block backdrop-blur-sm mb-6 border border-amber-400/30">
                                <Icons.Anchor className="h-16 w-16 text-amber-400 mx-auto" />
                            </div>
                            <h2 className="text-3xl font-bold uppercase tracking-widest mb-2 text-amber-400 drop-shadow-lg">SMAN Taruna Nala</h2>
                            <p className="text-sm font-light tracking-wide text-slate-200 mb-8 border-b border-amber-400/50 inline-block pb-1">Jawa Timur</p>
                            <p className="mt-8 text-sm italic opacity-90 max-w-xs mx-auto text-slate-300">"Assessment Center & Layanan Konseling Siswa"</p>
                        </div>
                    </div>
                    <div className="md:w-1/2 bg-white p-8 md:p-12 relative z-20">
                        <div className="flex mb-8 border-b-2 border-slate-100">
                            <button className={`flex-1 py-3 text-sm font-bold uppercase tracking-wider ${activeTab === 'student' ? 'text-slate-900 border-b-4 border-amber-400' : 'text-slate-400'}`} onClick={() => setActiveTab('student')}>Siswa</button>
                            <button className={`flex-1 py-3 text-sm font-bold uppercase tracking-wider ${activeTab === 'teacher' ? 'text-slate-900 border-b-4 border-amber-400' : 'text-slate-400'}`} onClick={() => setActiveTab('teacher')}>Guru</button>
                        </div>
                        {error && <div className="mb-6 p-3 bg-red-50 border-l-4 border-red-600 text-red-700 text-sm font-bold">{error}</div>}
                        
                        {activeTab === 'student' ? (
                            <form onSubmit={handleStudentLogin} className="space-y-5">
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Nama Lengkap</label><input type="text" className="w-full px-4 py-3 border-2 border-slate-200 rounded-md focus:border-slate-800 outline-none" placeholder="Nama Anda" value={studentName} onChange={(e) => setStudentName(e.target.value)}/></div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2 flex items-center justify-between"><span>Kode Rahasia (Sebagai Kata Sandi)</span><Icons.Lock className="w-3 h-3 text-slate-400" /></label>
                                    <input type="password" className="w-full px-4 py-3 border-2 border-slate-200 rounded-md focus:border-slate-800 outline-none tracking-widest" placeholder="••••••••••" value={studentNis} onChange={(e) => setStudentNis(e.target.value)}/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Kelas / Angkatan</label>
                                    <select className="w-full px-4 py-3 border-2 border-slate-200 rounded-md focus:border-slate-800 outline-none bg-white" value={studentClass} onChange={(e) => setStudentClass(e.target.value)}>
                                        <option value="">Pilih Kelas...</option><option value="X1">Kelas X1</option><option value="X2">Kelas X2</option><option value="X3">Kelas X3</option><option value="X4">Kelas X4</option><option value="X5">Kelas X5</option><option value="X6">Kelas X6</option><option value="X7">Kelas X7</option><option value="X8">Kelas X8</option><option value="X9">Kelas X9</option><option value="X10">Kelas X10</option><option value="XI 1">Kelas XI 1</option><option value="XI 2">Kelas XI 2</option><option value="XI 3">Kelas XI 3</option><option value="XI 4">Kelas XI 4</option><option value="XI 5">Kelas XI 5</option><option value="XI 6">Kelas XI 6</option><option value="XI 7">Kelas XI 7</option>
                                    </select>
                                </div>
                                <button type="submit" className="w-full bg-slate-900 text-white font-bold py-4 rounded uppercase tracking-widest hover:bg-slate-800 transition shadow-lg mt-2">Masuk</button>
                            </form>
                        ) : (
                            <form onSubmit={handleTeacherLogin} className="space-y-6">
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">PIN Otorisasi</label><input type="password" className="w-full px-4 py-3 border-2 border-slate-200 rounded-md focus:border-slate-800 outline-none tracking-widest" placeholder="••••••" value={teacherPass} onChange={(e) => setTeacherPass(e.target.value)}/></div>
                                <button type="submit" className="w-full bg-amber-500 text-slate-900 font-bold py-4 rounded uppercase tracking-widest hover:bg-amber-400 transition shadow-lg">Akses Dashboard</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        // --- PORTAL SISWA (LANDING PAGE STYLE) ---
        function StudentPortal({ user, onSubmit, view, setView, materials, announcement, submissions, chats, onSendChat }) {
            const hasSubmittedAssessment = submissions.some(sub => sub.nis === user.nis && sub.type === 'assessment');
            const hasSubmittedDcm = submissions.some(sub => sub.nis === user.nis && sub.type === 'dcm');
            const roomId = useMemo(() => generateRoomId(user.nis), [user.nis]);

            if (view === 'home') {
                return (
                    <div className="animate-fade-in w-full">
                        <div className="bg-slate-900 rounded-2xl p-10 md:p-16 text-center text-white mb-12 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-400 to-amber-600"></div>
                            <Icons.Shield className="h-16 w-16 text-amber-400 mx-auto mb-6 opacity-80" />
                            <h2 className="text-3xl md:text-5xl font-bold uppercase tracking-wider mb-4">Selamat Datang, {user.name}</h2>
                            <p className="text-slate-300 max-w-2xl mx-auto text-lg leading-relaxed mb-8">
                                Layanan Bimbingan dan Konseling ini hadir untuk mendukung perkembangan pribadimu, sosial, prestasi belajar, dan perencanaan karirmu ke depan.
                            </p>
                            <button onClick={() => { document.getElementById('layanan').scrollIntoView({ behavior: 'smooth' }); }} className="bg-amber-500 text-slate-900 px-8 py-3 rounded-full font-bold uppercase tracking-widest hover:bg-amber-400 transition shadow-lg">Jelajahi Layanan</button>
                        </div>

                        <div id="layanan" className="pt-8 mb-16">
                            <div className="text-center mb-10"><h3 className="text-2xl font-bold text-slate-900 uppercase tracking-widest mb-2">Layanan Utama</h3><div className="w-16 h-1 bg-amber-400 mx-auto"></div></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                <div onClick={() => { if (hasSubmittedAssessment) alert("Anda sudah menyelesaikan Need Assessment."); else setView('assessment'); }} className={`bg-white p-8 rounded-xl shadow-lg border-t-8 border-blue-500 transition cursor-pointer group transform ${hasSubmittedAssessment ? 'opacity-80' : 'hover:shadow-2xl hover:-translate-y-2'} flex flex-col h-full`}>
                                    <div className={`p-4 rounded-full transition w-max mb-6 ${hasSubmittedAssessment ? 'bg-slate-100 text-slate-400' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-500 group-hover:text-white'}`}><Icons.Activity className="h-8 w-8" /></div>
                                    <h3 className="text-xl font-bold text-slate-900 uppercase tracking-wider mb-3">Need Assessment</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed flex-grow">Angket pemetaan kebutuhan agar Guru BK dapat menyusun materi bimbingan klasikal yang sesuai.</p>
                                    <div className={`mt-6 flex items-center font-bold text-sm uppercase tracking-wider ${hasSubmittedAssessment ? 'text-green-600' : 'text-blue-600'}`}>{hasSubmittedAssessment ? <><Icons.CheckCircle className="w-5 h-5 mr-1" /> Selesai</> : <>Mulai <Icons.ChevronRight className="w-4 h-4 ml-1" /></>}</div>
                                </div>

                                <div onClick={() => { if (hasSubmittedDcm) alert("Anda sudah menyelesaikan Daftar Cek Masalah (DCM)."); else setView('dcm'); }} className={`bg-white p-8 rounded-xl shadow-lg border-t-8 border-amber-500 transition cursor-pointer group transform ${hasSubmittedDcm ? 'opacity-80' : 'hover:shadow-2xl hover:-translate-y-2'} flex flex-col h-full`}>
                                    <div className={`p-4 rounded-full transition w-max mb-6 ${hasSubmittedDcm ? 'bg-slate-100 text-slate-400' : 'bg-amber-50 text-amber-600 group-hover:bg-amber-500 group-hover:text-white'}`}><Icons.CheckSquare className="h-8 w-8" /></div>
                                    <h3 className="text-xl font-bold text-slate-900 uppercase tracking-wider mb-3">Daftar Cek Masalah</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed flex-grow">Instrumen *checklist* untuk mendata masalah spesifik yang saat ini sedang Anda alami/rasakan.</p>
                                    <div className={`mt-6 flex items-center font-bold text-sm uppercase tracking-wider ${hasSubmittedDcm ? 'text-green-600' : 'text-amber-600'}`}>{hasSubmittedDcm ? <><Icons.CheckCircle className="w-5 h-5 mr-1" /> Selesai</> : <>Mulai <Icons.ChevronRight className="w-4 h-4 ml-1" /></>}</div>
                                </div>

                                <div onClick={() => setView('curhat')} className="bg-white p-8 rounded-xl shadow-lg border-t-8 border-indigo-500 hover:shadow-2xl transition cursor-pointer group transform hover:-translate-y-2 flex flex-col h-full">
                                    <div className="p-4 bg-indigo-50 rounded-full text-indigo-600 group-hover:bg-indigo-500 group-hover:text-white transition w-max mb-6"><Icons.HeartHandshake className="h-8 w-8" /></div>
                                    <h3 className="text-xl font-bold text-slate-900 uppercase tracking-wider mb-3">Ruang Konseling</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed flex-grow">Layanan privat bagi Siswa untuk bercerita, berkonsultasi, dan membalas pesan dari Guru BK secara aman dan rahasia.</p>
                                    <div className="mt-6 flex items-center text-indigo-600 font-bold text-sm uppercase tracking-wider">Buka Ruang <Icons.ChevronRight className="w-4 h-4 ml-1" /></div>
                                </div>

                                <div onClick={() => setView('materi')} className="bg-white p-8 rounded-xl shadow-lg border-t-8 border-emerald-500 hover:shadow-2xl transition cursor-pointer group transform hover:-translate-y-2 flex flex-col h-full">
                                    <div className="p-4 bg-emerald-50 rounded-full text-emerald-600 group-hover:bg-emerald-500 group-hover:text-white transition w-max mb-6"><Icons.BookOpen className="h-8 w-8" /></div>
                                    <h3 className="text-xl font-bold text-slate-900 uppercase tracking-wider mb-3">Materi Bimbingan</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed flex-grow">Akses artikel dan panduan pengembangan diri khusus untuk Taruna.</p>
                                    <div className="mt-6 flex items-center text-emerald-600 font-bold text-sm uppercase tracking-wider">Baca Materi <Icons.ChevronRight className="w-4 h-4 ml-1" /></div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-200 rounded-xl p-10 text-center mb-10">
                            <h3 className="text-xl font-bold text-slate-800 uppercase tracking-widest mb-4">Informasi Penting</h3>
                            <p className="text-slate-600 max-w-3xl mx-auto mb-6 whitespace-pre-wrap">{announcement}</p>
                            <p className="text-sm font-bold text-slate-500">- Tim BK SMAN Taruna Nala -</p>
                        </div>
                    </div>
                );
            }

            if (view === 'assessment') return <LikertAssessment user={user} onBack={() => setView('home')} onSubmit={onSubmit} />;
            if (view === 'dcm') return <DcmAssessment user={user} onBack={() => setView('home')} onSubmit={onSubmit} />;
            if (view === 'materi') return <MateriBK onBack={() => setView('home')} materials={materials} />;
            if (view === 'curhat') return <CurhatDashboard user={user} roomId={roomId} chats={chats} onSendChat={onSendChat} onBack={() => setView('home')} onSubmit={onSubmit} submissions={submissions} />;
        }

        // --- RUANG KONSELING 2-IN-1 (SISWA) ---
        function CurhatDashboard({ user, roomId, chats, onSendChat, onBack, onSubmit, submissions }) {
            const [tab, setTab] = useState('form'); 
            const [text, setText] = useState('');
