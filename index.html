                                        {[1, 2, 3, 4].map((val) => {
                                            const isSelected = answers[q.id] === val;
                                            let bgClass = val === 1 ? (isSelected ? 'bg-red-600 text-white shadow-md border-red-600' : 'bg-white text-slate-600 border-slate-200') : val === 2 ? (isSelected ? 'bg-orange-500 text-white shadow-md border-orange-500' : 'bg-white text-slate-600 border-slate-200') : val === 3 ? (isSelected ? 'bg-green-500 text-white shadow-md border-green-500' : 'bg-white text-slate-600 border-slate-200') : (isSelected ? 'bg-emerald-600 text-white shadow-md border-emerald-600' : 'bg-white text-slate-600 border-slate-200');
                                            return (<button key={val} onClick={() => handleAnswer(q.id, val)} className={`py-4 px-2 rounded-xl text-sm font-bold transition-all border-2 ${bgClass} ${isSelected ? 'transform scale-105' : ''}`}>Skor {val}</button>);
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-between items-center glass-panel p-4 rounded-2xl shadow-sm sticky bottom-4">
                            <button onClick={() => setStep(step - 1)} className="px-6 py-3 bg-white text-slate-600 font-bold rounded-xl shadow-sm uppercase text-sm flex items-center transition"><Icons.ChevronLeft className="w-5 h-5 mr-1"/> Kembali</button>
                            <button onClick={() => { if (isStepComplete()) setStep(step + 1); else alert("Mohon isi semua pernyataan."); }} className={`px-8 py-3 font-bold rounded-xl shadow uppercase flex items-center text-sm ${isStepComplete() ? 'bg-blue-600 text-white hover:-translate-y-1' : 'bg-slate-200 text-slate-400'}`}>Lanjut <Icons.ChevronRight className="w-5 h-5 ml-1"/></button>
                        </div>
                    </div>
                );
            }

            if (step === 5) return (
                <div className="max-w-4xl mx-auto animate-fade-in relative">
                    <div className="glass-panel p-8 sm:p-10 rounded-2xl shadow-xl border-t-8 border-slate-900 mt-6">
                        <h2 className="text-2xl font-bold uppercase text-slate-900 tracking-tight mb-8">Pertanyaan Terbuka</h2>
                        <div className="space-y-8">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">Materi / Hal apa yang ingin Anda dapatkan?</label>
                                <textarea className="w-full p-5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none resize-none bg-slate-50 text-lg shadow-sm" rows="3" value={materiDiharapkan} onChange={(e) => setMateriDiharapkan(e.target.value)}></textarea>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">Apa harapan Anda selama bersekolah?</label>
                                <textarea className="w-full p-5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none resize-none bg-slate-50 text-lg shadow-sm" rows="3" value={harapanSekolah} onChange={(e) => setHarapanSekolah(e.target.value)}></textarea>
                            </div>
                        </div>
                        <div className="mt-12 flex justify-between items-center border-t border-slate-100 pt-6">
                            <button onClick={() => setStep(4)} className="px-6 py-3 bg-white text-slate-600 font-bold rounded-xl shadow border border-slate-200 uppercase text-sm flex items-center transition"><Icons.ChevronLeft className="inline w-4 h-4 mr-1"/> Kembali</button>
                            <button onClick={async () => { const scoreTotal = Object.values(answers).reduce((a, b) => a + b, 0); await onSubmit({ type: 'assessment', answers, scoreTotal, story: '', materiDiharapkan, harapanSekolah }); setStep(6); }} className="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 hover:-translate-y-1 transform transition uppercase flex items-center text-sm">
                                Kirim Data Sekarang <Icons.CheckCircle className="inline w-4 h-4 ml-2"/>
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (step === 6) return (
                <div className="max-w-xl mx-auto animate-fade-in glass-panel p-10 rounded-2xl shadow-2xl text-center border-t-8 border-green-500 mt-10">
                    <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.CheckCircle className="w-12 h-12 text-green-600" /></div>
                    <h2 className="text-3xl font-bold text-slate-900 uppercase mb-3 tracking-tight">Asesmen Selesai!</h2>
                    <button onClick={onBack} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 rounded-xl font-bold text-lg uppercase tracking-widest hover:from-blue-700 hover:to-indigo-700 transition shadow-xl hover:-translate-y-1">Kembali ke Menu Utama</button>
                </div>
            );
        }

        // --- DASHBOARD GURU ---
        function TeacherDashboard({ submissions, materials, announcement, chats, onAddMaterial, onDeleteMaterial, onEditMaterial, onUpdateAnnouncement, onDeleteSubmission, onSendChat }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedSub, setSelectedSub] = useState(null);
            const [activeMainTab, setActiveMainTab] = useState('rekap'); 
            const [activeTableTab, setActiveTableTab] = useState('assessment');
            const [activeStatsTab, setActiveStatsTab] = useState('low'); 
            const [selectedChatRoomId, setSelectedChatRoomId] = useState(null);

            const [editingId, setEditingId] = useState(null);
            const [newMatTitle, setNewMatTitle] = useState('');
            const [newMatDomain, setNewMatDomain] = useState('Pribadi');
            const [newMatAuthor, setNewMatAuthor] = useState('Pak Hakam'); 
            const [newMatContent, setNewMatContent] = useState('');
            const [newMatImg, setNewMatImg] = useState(''); 
            const [newMatUrl, setNewMatUrl] = useState(''); 
            const [announcementText, setAnnouncementText] = useState(announcement || '');
            const imageInputRef = useRef(null);

            useEffect(() => { setAnnouncementText(announcement); }, [announcement]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 500 * 1024) {
                    alert("Ukuran gambar terlalu besar! Maksimal 500 KB.");
                    e.target.value = ""; return;
                }
                const reader = new FileReader();
                reader.onloadend = () => setNewMatImg(reader.result);
                reader.readAsDataURL(file);
            };

            const handleSubmitMateri = (e) => {
                e.preventDefault();
                if(!newMatTitle || !newMatContent) return alert("Judul dan Isi Materi wajib diisi!");
                const matData = { title: newMatTitle, domain: newMatDomain, author: newMatAuthor, content: newMatContent, imageUrl: newMatImg || 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800', materialUrl: newMatUrl };
                if (editingId) { onEditMaterial(editingId, matData); setEditingId(null); } 
                else { onAddMaterial(matData); }
                setNewMatTitle(''); setNewMatContent(''); setNewMatImg(''); setNewMatUrl('');
                if(imageInputRef.current) imageInputRef.current.value = "";
            };

            const handleEditClick = (mat) => {
                setEditingId(mat.id); setNewMatTitle(mat.title); setNewMatDomain(mat.domain); setNewMatAuthor(mat.author || 'Pak Hakam'); setNewMatContent(mat.content); setNewMatImg(mat.imageUrl || ''); setNewMatUrl(mat.materialUrl || '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null); setNewMatTitle(''); setNewMatContent(''); setNewMatImg(''); setNewMatUrl('');
                if(imageInputRef.current) imageInputRef.current.value = "";
            };

            const stats = useMemo(() => {
                const scores = { Pribadi: 0, Sosial: 0, Belajar: 0, Karir: 0 };
                let assessmentCount = 0; let dcmCount = 0;
                const akpdLowCounts = {}; const akpdHighCounts = {}; const dcmItemCounts = {};

                submissions.forEach(sub => {
                    if (sub.type === 'assessment') {
                        assessmentCount++;
                        Object.entries(sub.answers).forEach(([key, val]) => {
                            if (key.startsWith('P')) scores.Pribadi += val;
                            if (key.startsWith('S')) scores.Sosial += val;
                            if (key.startsWith('B')) scores.Belajar += val;
                            if (key.startsWith('K')) scores.Karir += val;

                            if (val <= 2) akpdLowCounts[key] = (akpdLowCounts[key] || 0) + 1;
                            else if (val >= 3) akpdHighCounts[key] = (akpdHighCounts[key] || 0) + 1;
                        });
                    } else if (sub.type === 'dcm') {
                        dcmCount++;
                        if (Array.isArray(sub.answers)) {
                            sub.answers.forEach(key => { dcmItemCounts[key] = (dcmItemCounts[key] || 0) + 1; });
                        }
                    }
                });

                const getTop3 = (countsMap, prefix, qDictionary, totalCount) => {
                    return Object.entries(countsMap).filter(([key]) => key.startsWith(prefix)).sort((a, b) => b[1] - a[1]).slice(0, 3)
                        .map(([key, count]) => ({ id: key, text: Object.values(qDictionary).flat().find(q => q.id === key)?.text || key, count, percentage: totalCount > 0 ? Math.round((count / totalCount) * 100) : 0 }));
                };

                return { 
                    scores, assessmentCount, dcmCount, 
                    topAkpdLow: { pribadi: getTop3(akpdLowCounts, 'P', akpdQuestions, assessmentCount), sosial: getTop3(akpdLowCounts, 'S', akpdQuestions, assessmentCount), belajar: getTop3(akpdLowCounts, 'B', akpdQuestions, assessmentCount), karir: getTop3(akpdLowCounts, 'K', akpdQuestions, assessmentCount) }, 
                    topAkpdHigh: { pribadi: getTop3(akpdHighCounts, 'P', akpdQuestions, assessmentCount), sosial: getTop3(akpdHighCounts, 'S', akpdQuestions, assessmentCount), belajar: getTop3(akpdHighCounts, 'B', akpdQuestions, assessmentCount), karir: getTop3(akpdHighCounts, 'K', akpdQuestions, assessmentCount) }, 
                    topDcm: { kesehatan: getTop3(dcmItemCounts, 'DCM_K', dcmQuestions, dcmCount), keluarga: getTop3(dcmItemCounts, 'DCM_F', dcmQuestions, dcmCount), "keadaan kehidupan ekonomi": getTop3(dcmItemCounts, 'DCM_kke', dcmQuestions, dcmCount) }
                };
            }, [submissions]);

            const chatRooms = useMemo(() => {
                const rooms = {};
                chats.forEach(chat => {
                    if (!rooms[chat.roomId]) {
                        rooms[chat.roomId] = { roomId: chat.roomId, studentName: chat.studentName, classCode: chat.classCode, lastMessage: chat, messages: [] };
                    }
                    rooms[chat.roomId].messages.push(chat);
                    if (new Date(chat.timestamp) > new Date(rooms[chat.roomId].lastMessage.timestamp)) rooms[chat.roomId].lastMessage = chat;
                });
                return Object.values(rooms).sort((a, b) => new Date(b.lastMessage.timestamp) - new Date(a.lastMessage.timestamp));
            }, [chats]);

            const chartGradient = useMemo(() => {
                const total = Object.values(stats.scores).reduce((a, b) => a + b, 0) || 1;
                const p = (stats.scores.Pribadi / total) * 100; const s = (stats.scores.Sosial / total) * 100; const b = (stats.scores.Belajar / total) * 100;
                return `conic-gradient(#f43f5e 0% ${p}%, #10b981 ${p}% ${p + s}%, #3b82f6 ${p + s}% ${p + s + b}%, #f59e0b ${p + s + b}% 100%)`;
            }, [stats]);

            const filtered = submissions.filter(sub => {
                const matchTab = sub.type === activeTableTab;
                const matchSearch = sub.name.toLowerCase().includes(searchTerm.toLowerCase()) || sub.classCode.toLowerCase().includes(searchTerm.toLowerCase());
                return matchTab && matchSearch;
            });

            const getDcmText = (id) => Object.values(dcmQuestions).flat().find(q => q.id === id)?.text || id;

            const handleDownloadCSV = () => {
                let headers = []; let rowsData = [];
                const escapeCSV = (str) => { if (!str) return '""'; return `"${str.toString().replace(/"/g, '""')}"`; };

                if (activeTableTab === 'assessment') {
                    headers = [ "Waktu Kirim", "Nama Taruna", "Kelas", "Jenis Instrumen", "Total Skor", "Materi Diharapkan", "Harapan Sekolah", "P1", "P2", "P3", "P4", "P5", "S1", "S2", "S3", "S4", "S5", "B1", "B2", "B3", "B4", "B5", "K1", "K2", "K3", "K4", "K5" ];
                    const targetSubs = submissions.filter(s => s.type === 'assessment');
                    rowsData = targetSubs.map(sub => {
                        const date = new Date(sub.timestamp).toLocaleString('id-ID');
                        return [ escapeCSV(date), escapeCSV(sub.name), escapeCSV(sub.classCode), escapeCSV("Need Assessment"), sub.scoreTotal || 0, escapeCSV(sub.materiDiharapkan), escapeCSV(sub.harapanSekolah), sub.answers?.P1 || '', sub.answers?.P2 || '', sub.answers?.P3 || '', sub.answers?.P4 || '', sub.answers?.P5 || '', sub.answers?.S1 || '', sub.answers?.S2 || '', sub.answers?.S3 || '', sub.answers?.S4 || '', sub.answers?.S5 || '', sub.answers?.B1 || '', sub.answers?.B2 || '', sub.answers?.B3 || '', sub.answers?.B4 || '', sub.answers?.B5 || '', sub.answers?.K1 || '', sub.answers?.K2 || '', sub.answers?.K3 || '', sub.answers?.K4 || '', sub.answers?.K5 || '' ].join(",");
                    });
                } 
                else if (activeTableTab === 'dcm') {
                    headers = [ "Waktu Kirim", "Nama Taruna", "Kelas", "Jenis Instrumen", "Jumlah Masalah", "Rincian Masalah yang Dialami (Teks Otomatis)" ];
                    const targetSubs = submissions.filter(s => s.type === 'dcm');
                    rowsData = targetSubs.map(sub => {
                        const date = new Date(sub.timestamp).toLocaleString('id-ID');
                        const masalahText = Array.isArray(sub.answers) ? sub.answers.map(id => getDcmText(id)).join(" | ") : "";
                        return [ escapeCSV(date), escapeCSV(sub.name), escapeCSV(sub.classCode), escapeCSV("DCM"), sub.scoreTotal || 0, escapeCSV(masalahText) ].join(",");
                    });
                }
                else if (activeTableTab === 'curhat') {
                    headers = [ "Waktu Kirim", "Nama Taruna", "Kelas", "Jenis Instrumen", "Isi Laporan / Surat Curhat" ];
                    const targetSubs = submissions.filter(s => s.type === 'curhat');
                    rowsData = targetSubs.map(sub => {
                        const date = new Date(sub.timestamp).toLocaleString('id-ID');
                        return [ escapeCSV(date), escapeCSV(sub.name), escapeCSV(sub.classCode), escapeCSV("Surat Curhat"), escapeCSV(sub.story) ].join(",");
                    });
                }

                if (rowsData.length === 0) return alert("Belum ada data untuk diunduh pada tab ini.");
                const BOM = "\uFEFF";
                const csvContent = "data:text/csv;charset=utf-8," + encodeURIComponent(BOM + headers.join(",") + "\n" + rowsData.join("\n"));
                const link = document.createElement("a");
                link.setAttribute("href", csvContent);
                link.setAttribute("download", `Rekap_Data_${activeTableTab.toUpperCase()}_Taruna_Nala.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const renderTop3List = (title, items, colorClass) => {
                return (
                    <div className="bg-slate-50 p-4 rounded border border-slate-100 flex flex-col">
                        <h4 className={`font-bold text-sm uppercase mb-3 ${colorClass}`}>{title}</h4>
                        {items.length === 0 ? (
                            <p className="text-xs text-slate-400 italic">Belum ada data menonjol.</p>
                        ) : (
                            <div className="space-y-3">
                                {items.map((item) => {
                                    return (
                                        <div key={item.id} className="text-sm">
                                            <div className="flex justify-between items-start mb-1 gap-2">
                                                <span className="text-slate-700 font-medium text-xs line-clamp-2"><span className="font-bold mr-1">{item.id}.</span>{item.text}</span>
                                                <span className="font-bold text-slate-900 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-slate-200 shrink-0">{item.percentage}%</span>
                                            </div>
                                            <div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                                                <div className="bg-slate-500 h-1.5 rounded-full transition-all duration-1000 ease-out" style={{ width: `${item.percentage}%`, backgroundColor: 'currentColor' }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                );
            };

            if (activeMainTab === 'materi') {
                return ( 
                    <div className="space-y-8 animate-fade-in w-full">
                        <div className="flex overflow-x-auto border-b-2 border-slate-200 pb-1 mb-8 gap-2 scrollbar-hide">
                            <button onClick={() => setActiveMainTab('rekap')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Rekap Asesmen</button>
                            <button onClick={() => setActiveMainTab('chat')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Konseling Interaktif</button>
                            <button className="px-4 py-2 font-bold uppercase tracking-wider text-slate-900 border-b-4 border-amber-500 -mb-[3px] whitespace-nowrap">Manajemen Materi BK</button>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-xl shadow border-t-4 border-emerald-500 h-max">
                                    <div className="flex items-center mb-6 border-b pb-3"><Icons.PlusCircle className="w-6 h-6 text-emerald-500 mr-2" /><h3 className="font-bold uppercase text-slate-800">{editingId ? 'Edit Materi' : 'Tambah Materi Baru'}</h3></div>
                                    <form onSubmit={handleSubmitMateri} className="space-y-4">
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Judul Materi</label><input type="text" className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50" value={newMatTitle} onChange={e => setNewMatTitle(e.target.value)} required /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Bidang Layanan</label>
                                                <select className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50" value={newMatDomain} onChange={e => setNewMatDomain(e.target.value)}>
                                                    <option value="Pribadi">Pribadi</option><option value="Sosial">Sosial</option><option value="Belajar">Belajar</option><option value="Karir">Karir</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Guru Pengunggah</label>
                                                <select className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50" value={newMatAuthor} onChange={e => setNewMatAuthor(e.target.value)}>
                                                    <option value="Pak Hakam">Pak Hakam</option><option value="Miss Thalia">Miss Thalia</option><option value="Miss Iis">Miss Iis</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Isi Singkat</label><textarea className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50 h-24" value={newMatContent} onChange={e => setNewMatContent(e.target.value)} required></textarea></div>
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Link Eksternal Materi</label><input type="url" className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50" value={newMatUrl} onChange={e => setNewMatUrl(e.target.value)} /></div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1 flex items-center">
                                                <Icons.Image className="w-4 h-4 mr-1" /> Gambar Cover (Maks 500KB)
                                            </label>
                                            <input type="file" accept="image/*" ref={imageInputRef} onChange={handleImageUpload} className="w-full p-2 border rounded focus:border-emerald-500 outline-none text-sm bg-slate-50 file:mr-4 file:py-1 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
                                            {newMatImg && <img src={newMatImg} alt="Preview" className="mt-2 h-16 rounded object-cover border border-slate-200" />}
                                        </div>
                                        <div className="flex gap-2">
                                            {editingId && <button type="button" onClick={handleCancelEdit} className="w-1/3 bg-slate-200 text-slate-700 font-bold py-3 rounded hover:bg-slate-300 transition uppercase tracking-wider text-xs shadow">Batal</button>}
                                            <button type="submit" className={`${editingId ? 'w-2/3' : 'w-full'} bg-emerald-600 text-white font-bold py-3 rounded hover:bg-emerald-700 transition uppercase tracking-wider text-xs shadow`}>{editingId ? 'Update Materi' : 'Publish Materi'}</button>
                                        </div>
                                    </form>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow border-t-4 border-blue-500 h-max">
                                    <div className="flex items-center mb-6 border-b pb-3"><Icons.Layout className="w-6 h-6 text-blue-500 mr-2" /><h3 className="font-bold uppercase text-slate-800">Edit Pengumuman</h3></div>
                                    <div className="space-y-4">
                                        <textarea className="w-full p-2 border rounded focus:border-blue-500 outline-none text-sm bg-slate-50 h-24" value={announcementText} onChange={e => setAnnouncementText(e.target.value)}></textarea>
                                        <button onClick={() => onUpdateAnnouncement(announcementText)} className="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition uppercase tracking-wider text-xs shadow">Simpan</button>
                                    </div>
                                </div>
                            </div>
                            <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow border border-slate-200">
                                <h3 className="font-bold uppercase text-slate-800 mb-6 border-b pb-3">Daftar Materi Tayang</h3>
                                <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2">
                                    {materials.length === 0 ? (
                                        <p className="text-center text-slate-400 py-8 italic">Belum ada materi.</p>
                                    ) : (
                                        materials.map(mat => {
                                            return (
                                                <div key={mat.id} className="flex gap-4 p-4 border border-slate-100 bg-slate-50 rounded-lg group hover:bg-white hover:shadow transition">
                                                    <div className="w-24 h-24 shrink-0 rounded bg-slate-200 overflow-hidden"><img src={mat.imageUrl} className="w-full h-full object-cover" /></div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-[10px] font-bold uppercase bg-slate-200 text-slate-600 px-2 py-0.5 rounded">{mat.domain}</span>
                                                            <span className="text-[10px] font-bold uppercase text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded">Oleh: {mat.author || 'Pak Hakam'}</span>
                                                        </div>
                                                        <h4 className="font-bold text-slate-900 truncate">{mat.title}</h4>
                                                        <p className="text-sm text-slate-500 line-clamp-2 mt-1 mb-2">{mat.content}</p>
                                                        {mat.materialUrl && (
                                                            <a href={mat.materialUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-blue-500 hover:text-blue-700 underline">Cek Tautan Materi</a>
                                                        )}
                                                    </div>
                                                    <div className="shrink-0 flex items-center space-x-1">
                                                        <button onClick={() => handleEditClick(mat)} className="p-2 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded transition" title="Edit Materi"><Icons.Edit className="w-5 h-5" /></button>
                                                        <button onClick={() => handleDeleteMaterial(mat.id)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded transition" title="Hapus Materi"><Icons.Trash className="w-5 h-5" /></button>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (activeMainTab === 'chat') {
                const activeRoomData = chatRooms.find(r => r.roomId === selectedChatRoomId);
                return (
                    <div className="space-y-8 animate-fade-in w-full h-[calc(100vh-140px)] flex flex-col">
                        <div className="flex overflow-x-auto border-b-2 border-slate-200 pb-1 mb-4 gap-2 shrink-0 scrollbar-hide">
                            <button onClick={() => setActiveMainTab('rekap')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Rekap Asesmen</button>
                            <button className="px-4 py-2 font-bold uppercase tracking-wider text-slate-900 border-b-4 border-amber-500 -mb-[3px] whitespace-nowrap">Konseling Interaktif</button>
                            <button onClick={() => setActiveMainTab('materi')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Kelola Materi BK</button>
                        </div>

                        {selectedChatRoomId ? (
                            <div className="flex-1 w-full bg-white rounded-xl shadow border border-slate-200 overflow-hidden flex flex-col h-full relative">
                                <ChatInterface user={{name: 'Guru BK', role: 'teacher'}} roomId={selectedChatRoomId} chats={chats} onSendChat={onSendChat} onBack={() => setSelectedChatRoomId(null)} isTeacher={true} studentName={activeRoomData?.studentName} classCode={activeRoomData?.classCode} />
                            </div>
                        ) : (
                            <div className="flex-1 bg-white rounded-xl shadow border border-slate-200 overflow-hidden flex flex-col">
                                <div className="p-5 border-b bg-slate-50 shrink-0"><h3 className="font-bold uppercase text-slate-900 flex items-center"><Icons.MessageSquare className="w-5 h-5 mr-2 text-indigo-600" /> Daftar Inbox Taruna</h3></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {chatRooms.length === 0 ? ( 
                                        <p className="text-center text-slate-400 py-10 italic">Belum ada pesan masuk.</p> 
                                    ) : (
                                        chatRooms.map(room => {
                                            return (
                                                <div key={room.roomId} onClick={() => setSelectedChatRoomId(room.roomId)} className="flex items-center justify-between p-4 bg-white border border-slate-100 shadow-sm rounded-xl cursor-pointer hover:border-indigo-300 hover:shadow transition group">
                                                    <div className="flex items-center min-w-0">
                                                        <div className="w-12 h-12 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xl mr-4 shrink-0">{room.studentName.charAt(0).toUpperCase()}</div>
                                                        <div className="min-w-0 flex-1">
                                                            <div className="flex items-baseline"><h4 className="font-bold text-slate-900 truncate mr-2">{room.studentName}</h4><span className="text-[10px] font-bold bg-slate-200 text-slate-600 px-2 py-0.5 rounded uppercase">{room.classCode}</span></div>
                                                            <p className="text-sm text-slate-500 truncate mt-0.5 max-w-sm">{room.lastMessage.sender === 'teacher' ? 'Anda: ' : ''}{room.lastMessage.text}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-end shrink-0 ml-4"><span className="text-xs font-mono text-slate-400 mb-2">{new Date(room.lastMessage.timestamp).toLocaleDateString('id-ID', {day: 'numeric', month: 'short'})}</span><Icons.ChevronRight className="w-5 h-5 text-slate-300 group-hover:text-indigo-500 transition" /></div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="space-y-8 animate-fade-in w-full">
                    <div className="flex overflow-x-auto border-b-2 border-slate-200 pb-1 mb-8 gap-2 scrollbar-hide">
                        <button className="px-4 py-2 font-bold uppercase tracking-wider text-slate-900 border-b-4 border-amber-500 -mb-[3px] whitespace-nowrap">Rekap Asesmen</button>
                        <button onClick={() => setActiveMainTab('chat')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Konseling Interaktif</button>
                        <button onClick={() => setActiveMainTab('materi')} className="px-4 py-2 font-bold uppercase tracking-wider text-slate-500 hover:text-slate-800 transition whitespace-nowrap">Kelola Materi BK</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded shadow border-l-4 border-slate-900 flex flex-col justify-center">
                            <h3 className="text-lg font-bold uppercase text-slate-800 mb-2">Total Laporan Masuk</h3>
                            <p className="text-4xl font-bold text-slate-900">{submissions.length} <span className="text-sm font-normal text-slate-500">Berkas</span></p>
                            <div className="mt-4 grid grid-cols-2 gap-2 text-xs font-bold text-slate-500 uppercase">
                                <span className="flex items-center"><Icons.Activity className="w-4 h-4 mr-1 text-blue-500"/> Need Assesment: {stats.assessmentCount}</span>
                                <span className="flex items-center"><Icons.CheckSquare className="w-4 h-4 mr-1 text-amber-500"/> DCM: {stats.dcmCount}</span>
                                <span className="flex items-center"><Icons.FileText className="w-4 h-4 mr-1 text-indigo-500"/> S. Curhat: {submissions.filter(s => s.type === 'curhat').length}</span>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded shadow border-l-4 border-blue-500 flex items-center justify-between">
                            <div>
                                <h3 className="text-sm font-bold uppercase text-slate-800 mb-4 tracking-wider">Intensitas Bidang (Need Assessment)</h3>
                                <ul className="text-sm space-y-1">
                                    <li className="flex items-center"><span className="w-3 h-3 bg-rose-500 rounded-full mr-2"></span> Pribadi ({stats.scores.Pribadi})</li>
                                    <li className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-full mr-2"></span> Sosial ({stats.scores.Sosial})</li>
                                    <li className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-full mr-2"></span> Belajar ({stats.scores.Belajar})</li>
                                    <li className="flex items-center"><span className="w-3 h-3 bg-amber-500 rounded-full mr-2"></span> Karir ({stats.scores.Karir})</li>
                                </ul>
                            </div>
                            <div className="pie-chart" style={{ background: chartGradient }}><div className="pie-center">CHART<br/>ASESMEN</div></div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded shadow border-l-4 border-blue-500">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-slate-100 pb-3 gap-4">
                            <div className="flex items-center">
                                <Icons.Activity className="w-6 h-6 text-blue-500 mr-2" />
                                <h3 className="text-lg font-bold uppercase text-slate-800">Top 3 Need Assessment</h3>
                            </div>
                            <div className="flex rounded-md shadow-sm" role="group">
                                <button type="button" onClick={() => setActiveStatsTab('low')} className={`px-4 py-2 text-xs font-bold uppercase border rounded-l-lg transition-colors ${activeStatsTab === 'low' ? 'bg-rose-500 text-white border-rose-500' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>Skor Rendah (1-2)</button>
                                <button type="button" onClick={() => setActiveStatsTab('high')} className={`px-4 py-2 text-xs font-bold uppercase border border-l-0 rounded-r-lg transition-colors ${activeStatsTab === 'high' ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>Skor Tinggi (3-4)</button>
                            </div>
                        </div>
                        {stats.assessmentCount === 0 ? ( <p className="text-slate-500 italic text-sm py-4 text-center">Belum ada data Need Assessment yang masuk.</p> ) : (
                            <div>
                                {activeStatsTab === 'low' && (
                                    <div className="animate-fade-in">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {renderTop3List("Bidang Pribadi", stats.topAkpdLow.pribadi, "text-rose-600")}
                                            {renderTop3List("Bidang Sosial", stats.topAkpdLow.sosial, "text-emerald-600")}
                                            {renderTop3List("Bidang Belajar", stats.topAkpdLow.belajar, "text-blue-600")}
                                            {renderTop3List("Bidang Karir", stats.topAkpdLow.karir, "text-amber-600")}
                                        </div>
                                        <p className="text-xs text-slate-400 mt-6 italic">*Skor "Tidak Setuju" / "Sangat Tidak Setuju". Mengindikasikan area masalah yang perlu dibantu.</p>
                                    </div>
                                )}
                                {activeStatsTab === 'high' && (
                                    <div className="animate-fade-in">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {renderTop3List("Bidang Pribadi", stats.topAkpdHigh.pribadi, "text-rose-600")}
                                            {renderTop3List("Bidang Sosial", stats.topAkpdHigh.sosial, "text-emerald-600")}
                                            {renderTop3List("Bidang Belajar", stats.topAkpdHigh.belajar, "text-blue-600")}
                                            {renderTop3List("Bidang Karir", stats.topAkpdHigh.karir, "text-amber-600")}
                                        </div>
                                        <p className="text-xs text-slate-400 mt-6 italic">*Skor "Setuju" / "Sangat Setuju". Mengindikasikan potensi atau kekuatan yang sudah dimiliki.</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded shadow border-l-4 border-amber-500">
                        <div className="flex items-center mb-6 border-b border-slate-100 pb-3">
                            <Icons.CheckSquare className="w-6 h-6 text-amber-500 mr-2" />
                            <h3 className="text-lg font-bold uppercase text-slate-800">Top 3 Masalah DCM (Per Bidang)</h3>
                        </div>
                        {stats.dcmCount === 0 ? ( <p className="text-slate-500 italic text-sm py-4 text-center">Belum ada data DCM yang masuk.</p> ) : (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {renderTop3List("Kesehatan Fisik", stats.topDcm.kesehatan, "text-red-500")}
                                {renderTop3List("Kondisi Keluarga", stats.topDcm.keluarga, "text-indigo-500")}
                                {renderTop3List("Keadaan Kehidupan Ekonomi", stats.topDcm["keadaan kehidupan ekonomi"], "text-purple-500")}
                            </div>
                        )}
                        <p className="text-xs text-slate-400 mt-6 italic">*Dihitung berdasarkan jumlah taruna yang mencentang (mengalami) masalah tersebut.</p>
                    </div>

                    <div>
                        <div className="flex flex-wrap gap-2 mb-4">
                            <button onClick={() => setActiveTableTab('assessment')} className={`px-5 py-3 rounded-t-lg font-bold text-sm uppercase tracking-wider transition-all ${activeTableTab === 'assessment' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100 border-t-4 border-transparent'}`}><Icons.Activity className="inline w-4 h-4 mr-2 mb-0.5" /> Need Assessment</button>
                            <button onClick={() => setActiveTableTab('dcm')} className={`px-5 py-3 rounded-t-lg font-bold text-sm uppercase tracking-wider transition-all ${activeTableTab === 'dcm' ? 'bg-amber-500 text-slate-900 shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100 border-t-4 border-transparent'}`}><Icons.CheckSquare className="inline w-4 h-4 mr-2 mb-0.5" /> Data DCM</button>
                            <button onClick={() => setActiveTableTab('curhat')} className={`px-5 py-3 rounded-t-lg font-bold text-sm uppercase tracking-wider transition-all ${activeTableTab === 'curhat' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100 border-t-4 border-transparent'}`}><Icons.FileText className="inline w-4 h-4 mr-2 mb-0.5" /> Surat Curhat</button>
                        </div>

                        <div className={`bg-white rounded-b shadow border-t-4 ${activeTableTab === 'assessment' ? 'border-blue-600' : activeTableTab === 'dcm' ? 'border-amber-500' : 'border-indigo-600'} overflow-hidden`}>
                            <div className="p-4 border-b flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50 gap-4">
                                <h3 className="font-bold text-slate-900 uppercase">Daftar Siswa ({activeTableTab === 'assessment' ? 'Need Assessment' : activeTableTab === 'dcm' ? 'DCM' : 'Surat Curhat'})</h3>
                                <div className="flex items-center space-x-3 w-full sm:w-auto">
                                    <div className="relative flex-1">
                                        <input type="text" placeholder="Cari Siswa/Kelas..." className="w-full pl-8 pr-4 py-2 border rounded text-sm outline-none focus:border-amber-400" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                        <Icons.Search className="w-4 h-4 text-slate-400 absolute left-2 top-1/2 -translate-y-1/2" />
                                    </div>
                                    <button onClick={handleDownloadCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm font-bold uppercase tracking-wider transition flex items-center shrink-0 shadow-sm">
                                        <Icons.Download className="w-4 h-4 mr-2" /> Unduh CSV
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-900 text-slate-200 font-bold uppercase text-xs">
                                        <tr>
                                            <th className="p-4 whitespace-nowrap">Waktu Kirim</th>
                                            <th className="p-4">Nama Taruna</th>
                                            <th className="p-4">Kelas</th>
                                            <th className="p-4 text-center">{activeTableTab === 'assessment' ? 'Skor Max 80' : activeTableTab === 'dcm' ? 'Jml Masalah' : 'Status'}</th>
                                            <th className="p-4 text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {filtered.length === 0 ? (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate-400 italic">Belum ada data di instrumen ini.</td></tr>
                                        ) : (
                                            filtered.map(sub => {
                                                return (
                                                    <tr key={sub.id} className="hover:bg-slate-50 transition">
                                                        <td className="p-4 text-slate-500 font-mono text-xs whitespace-nowrap">{new Date(sub.timestamp).toLocaleDateString('id-ID')}</td>
                                                        <td className="p-4 font-bold text-slate-800">{sub.name}</td>
                                                        <td className="p-4">{sub.classCode}</td>
                                                        <td className="p-4 text-center font-bold text-slate-700">
                                                            {sub.type === 'assessment' ? `${sub.scoreTotal} Poin` : sub.type === 'dcm' ? `${sub.scoreTotal} Item` : <span className="text-indigo-600 bg-indigo-100 px-2 py-1 rounded">Surat Masuk</span>}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={() => setSelectedSub(sub)} className="text-xs font-bold uppercase bg-slate-800 text-white px-3 py-1.5 rounded hover:bg-slate-700 whitespace-nowrap transition mr-1">Buka</button>
                                                            <button onClick={() => onDeleteSubmission(sub.id)} className="text-xs font-bold uppercase bg-red-500 text-white px-3 py-1.5 rounded hover:bg-red-600 whitespace-nowrap transition">Hapus</button>
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* MODAL DETAIL ASESMEN / DCM / CURHAT */}
                    {selectedSub && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-2xl rounded-lg shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                                <div className="bg-slate-900 text-white p-4 flex justify-between items-center shrink-0">
                                    <h3 className="font-bold uppercase tracking-widest flex items-center"><Icons.User className="w-5 h-5 mr-2 text-amber-400"/> Arsip Individu</h3>
                                    <button onClick={() => setSelectedSub(null)} className="p-1 rounded hover:bg-red-500 transition"><Icons.X className="w-5 h-5" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="mb-6 border-b border-slate-200 pb-4">
                                        <h2 className="text-2xl font-bold text-slate-900 uppercase">{selectedSub.name}</h2>
                                        <p className="text-slate-600 font-medium">{selectedSub.classCode} • {new Date(selectedSub.timestamp).toLocaleString('id-ID')}</p>
                                    </div>

                                    {selectedSub.type === 'curhat' && (
                                        <div>
                                            <h4 className="font-bold text-sm uppercase text-indigo-700 mb-3 flex items-center"><Icons.FileText className="w-5 h-5 mr-2"/> Surat Laporan Siswa</h4>
                                            <div className="bg-indigo-50 p-6 rounded-xl border border-indigo-100 text-indigo-900 text-lg leading-relaxed whitespace-pre-wrap shadow-inner">
                                                "{selectedSub.story}"
                                            </div>
                                            <div className="mt-6 p-4 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-600">
                                                *Tip: Jika Anda ingin membalas secara real-time, gunakan tab <b>Konseling Interaktif</b> di Dashboard Utama dan cari nama siswa ini.
                                            </div>
                                        </div>
                                    )}

                                    {selectedSub.type === 'dcm' && (
                                        <div>
                                            <div className="flex justify-between items-center bg-amber-50 border border-amber-200 p-4 rounded mb-6">
                                                <span className="font-bold uppercase text-sm text-amber-800">Total Masalah Tercentang</span>
                                                <span className="text-3xl font-bold text-amber-600">{selectedSub.scoreTotal}</span>
                                            </div>
                                            <h4 className="font-bold text-sm uppercase text-slate-500 mb-3 border-b pb-2">Rincian Masalah yang Dialami</h4>
                                            <ul className="space-y-2">
                                                {selectedSub.answers.map(id => {
                                                    return (
                                                        <li key={id} className="flex items-start p-3 bg-slate-50 border border-slate-100 rounded text-sm text-slate-700 font-medium">
                                                            <Icons.CheckSquare className="w-5 h-5 text-amber-500 mr-3 shrink-0" />
                                                            {Object.values(dcmQuestions).flat().find(q => q.id === id)?.text || id}
                                                        </li>
                                                    );
                                                })}
                                            </ul>
                                        </div>
                                    )}

                                    {selectedSub.type === 'assessment' && (
                                        <div className="space-y-6">
                                            <div className="flex justify-between items-center bg-blue-50 border border-blue-200 p-4 rounded">
                                                <span className="font-bold uppercase text-sm text-blue-800">Total Skor Intensitas</span>
                                                <span className="text-3xl font-bold text-blue-600">{selectedSub.scoreTotal} <span className="text-sm text-blue-400">/ 80</span></span>
                                            </div>
                                            {(selectedSub.materiDiharapkan || selectedSub.harapanSekolah) && (
                                                <div className="border border-slate-200 rounded overflow-hidden">
                                                    <div className="bg-slate-100 p-3 border-b border-slate-200 font-bold text-xs uppercase tracking-wider text-slate-700">Tanggapan Terbuka</div>
                                                    <div className="p-4 space-y-4">
                                                        <div><span className="block text-xs font-bold text-blue-600 uppercase mb-1">Materi yang Diharapkan:</span><p className="text-sm text-slate-800 bg-blue-50 p-3 rounded">"{selectedSub.materiDiharapkan}"</p></div>
                                                        <div><span className="block text-xs font-bold text-emerald-600 uppercase mb-1">Harapan di Sekolah:</span><p className="text-sm text-slate-800 bg-emerald-50 p-3 rounded">"{selectedSub.harapanSekolah}"</p></div>
                                                    </div>
                                                </div>
                                            )}
                                            <div>
                                                <h4 className="font-bold text-sm uppercase text-slate-500 mb-3 border-b pb-2">Analisis Butir Skor Terendah (Skor 1 / 2)</h4>
                                                <div className="space-y-2">
                                                    {Object.entries(selectedSub.answers).map(([key, val]) => {
                                                        if (val > 2) return null;
                                                        return (
                                                            <div key={key} className="flex justify-between items-center p-3 border border-slate-100 bg-slate-50 rounded">
                                                                <span className="text-sm font-medium text-slate-700 pr-4 leading-relaxed">
                                                                    <span className={`font-bold mr-2 px-1.5 py-0.5 text-xs rounded text-white ${key.startsWith('P') ? 'bg-rose-500': key.startsWith('S') ? 'bg-emerald-500': key.startsWith('B')?'bg-blue-500':'bg-amber-500'}`}>{key}</span> 
                                                                    {Object.values(akpdQuestions).flat().find(q => q.id === key)?.text || key}
                                                                </span>
                                                                <span className={`font-bold text-base shrink-0 px-3 py-1 rounded ${val===1 ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'}`}>{val}</span>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
